<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Thala Footwear</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    body {
      margin:0; 
      padding:0; 
      font-family: Arial, sans-serif; 
      background-color: #0f172a; 
      color: white;
    }

    .header {
      background-color: white; 
      padding: 15px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
      position: sticky; 
      top: 0;
    }

    .nav-container {
      max-width: 1200px; 
      margin: 0 auto; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 20px;
    }

    .nav-links {
      list-style: none; 
      display: flex; 
      gap: 25px; 
      padding: 0; 
      margin: 0;
    }

    .nav-links a {
      text-decoration: none; 
      color: #333; 
      font-size: 18px;
    }

    .nav-icons {
      display: flex; 
      gap: 15px; 
      align-items: center;
    }

    .cart-items {
      flex: 2; 
      background-color: #1e2937; 
      padding: 25px; 
      border-radius: 15px;
    }

    .order-summary {
      flex: 1; 
      background-color: #1e2937; 
      padding: 25px; 
      border-radius: 15px; 
      min-width: 300px;
    }

    table {
      width: 100%; 
      border-collapse: collapse;
    }

    th, td {
      padding: 15px;
    }

    .product-row td {
      padding: 20px 15px;
    }

    .quantity-control {
      display: flex; 
      align-items: center; 
      gap: 8px;
    }

    .qty-btn {
      background: #334155; 
      color: white; 
      border: none; 
      width: 30px; 
      height: 30px; 
      font-size: 18px; 
      cursor: pointer;
    }

    .checkout-btn {
      display: block; 
      text-align: center; 
      padding: 18px; 
      background: #e74c3c; 
      color: white; 
      text-decoration: none; 
      border-radius: 50px; 
      font-size: 18px; 
      font-weight: bold; 
      margin: 25px 0;
    }

    a:hover {
      color: #e74c3c;
    }

    @media (max-width: 900px) {
      .cart-wrapper {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="nav-container">
      <div>
        <img src="https://imgs.search.brave.com/4p2fRozYkA0vOqnhvKM2L1KUqFqfL39trIv7e-ZO0gg/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4u/dGV4dHN0dWRpby5j/b20vb3V0cHV0L3Nh/bXBsZS9ub3JtYWwv/MC82LzgvOC90aGFs/YS1sb2dvLTg2MC0y/ODg2MC5wbmc" alt="logo" style="height: 50px;">
      </div>

      <div style="display: flex; gap: 30px; align-items: center;">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Brands</a></li>
          <li><a href="#">More</a></li>
          <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-icons">
          <button style="background: none; border: none; font-size: 24px; color: #333; cursor: pointer;">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          
          <a href="cart.html" style="text-decoration:none; position: relative; color: #333; font-size: 24px;">
            <i class="fa-solid fa-cart-shopping"></i>
            <span style="position: absolute; top: -8px; right: -8px; background: red; color: white; font-size: 12px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">2</span>
          </a>
          
          <button style="background: none; border: none; cursor: pointer;">
            <img src="https://imgs.search.brave.com/3XPXZAARvj9HLVB_4rtjyNLqNLKUjYyOm7CjboPBWQ0/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wMjUv/ODY5LzU4My9zbWFs/bC9wcm9maWxlLWlt/YWdlLW9mLW1hbi1h/dmF0YXItZm9yLXNv/Y2lhbC1uZXR3b3Jr/cy13aXRoLWhhbGYt/Y2lyY2xlLWZhc2hp/b24tYnJpZ2h0LWls/bHVzdHJhdGlvbi1p/bi10cmVuZHktc3R5/bGUtdmVjdG9yLmpw/Zw" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ddd;">
          </button>
        </div>
      </div>
    </div>
  </div>

  <div style="max-width: 1100px; margin: 40px auto; padding: 0 20px;">

    <h1 style="text-align: center; color: #e74c3c; font-size: 40px; margin-bottom: 40px;">Shopping Cart</h1>

    <div class="cart-wrapper" style="display: flex; gap: 30px; flex-wrap: wrap;">

      <!-- Cart Items -->
      <div class="cart-items">
        <table>
          <thead>
            <tr style="border-bottom: 2px solid #334155;">
              <th style="text-align: left; color: #aaa; font-size: 14px;">Product</th>
              <th style="text-align: left; color: #aaa; font-size: 14px;">Price</th>
              <th style="text-align: left; color: #aaa; font-size: 14px;">Quantity</th>
              <th style="text-align: left; color: #aaa; font-size: 14px;">Total</th>
              <th style="width: 50px;"></th>
            </tr>
          </thead>
          <tbody>
            <tr class="product-row" style="border-bottom: 1px solid #334155;">
              <td style="display: flex; align-items: center; gap: 15px;">
                <img src="https://abrosshoes.com/cdn/shop/files/Cliff_0008_000A7864.jpg?v=1756296498&width=600" alt="Thala Signature" style="width: 90px; height: 90px; border-radius: 10px;">
                <div>
                  <h4 style="margin: 0 0 5px 0; font-size: 18px;">Thala Signature 07</h4>
                  <p style="margin: 0; color: #94a3b8; font-size: 15px;">Size: 9 | Color: Black</p>
                </div>
              </td>
              <td style="font-weight: bold; color: #e74c3c; font-size: 18px;">₹4,999</td>
              <td>
                <div class="quantity-control">
                  <button class="qty-btn">−</button>
                  <span style="width: 30px; text-align: center; font-size: 18px;">1</span>
                  <button class="qty-btn">+</button>
                </div>
              </td>
              <td style="font-weight: bold; color: #e74c3c; font-size: 18px;">₹4,999</td>
              <td>
                <button style="background: none; border: none; color: #e74c3c; font-size: 20px; cursor: pointer;">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <h3 style="margin-bottom: 20px; font-size: 24px;">Order Summary</h3>

        <div style="display: flex; margin-bottom: 20px; gap: 10px;">
          <input type="text" placeholder="Enter coupon code" style="flex: 1; padding: 12px; background: #334155; border: none; border-radius: 8px; color: white;">
          <button style="padding: 0 25px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer;">Apply</button>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155;">
          <span>Subtotal</span>
          <span>₹4,999</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155;">
          <span>Shipping</span>
          <span style="color: #4ade80;">FREE</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155;">
          <span>Taxes (18% GST)</span>
          <span>₹899</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 15px 0; font-size: 22px; font-weight: bold; color: #e74c3c;">
          <span>Total</span>
          <span>₹5,898</span>
        </div>

        <a href="checkout.html" class="checkout-btn">
          <i class="fas fa-lock"></i> Proceed to Checkout
        </a>

        <div style="text-align: center; margin-top: 15px;">
          <p style="color: #94a3b8; margin-bottom: 10px;">Secured Payment via</p>
          <div style="display: flex; justify-content: center; gap: 15px;">
            <img src="https://razorpay.com/assets/razorpay-logo.svg" alt="Razorpay" style="height: 35px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png" alt="Visa" style="height: 35px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png" alt="Mastercard" style="height: 35px;">
          </div>
        </div>
      </div>

    </div>

    <div style="text-align: center; margin-top: 50px;">
      <a href="shop.html" style="color: #94a3b8; text-decoration: none; font-size: 18px;">
        ← Continue Shopping
      </a>
    </div>

  </div>

</body>
</html>
