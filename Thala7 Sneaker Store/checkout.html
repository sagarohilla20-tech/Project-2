<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Thala Footwear</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color: #0f172a; color: white;">

  <div style="background-color: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: sticky; top: 0;">
    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;">
      <div>
        <img src="https://imgs.search.brave.com/4p2fRozYkA0vOqnhvKM2L1KUqFqfL39trIv7e-ZO0gg/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4u/dGV4dHN0dWRpby5j/b20vb3V0cHV0L3Nh/bXBsZS9ub3JtYWwv/MC82LzgvOC90aGFs/YS1sb2dvLTg2MC0y/ODg2MC5wbmc" alt="logo" style="height: 50px;">
      </div>
    </div>
  </div>

  <div style="max-width: 1100px; margin: 40px auto; padding: 0 20px;">

    <h1 style="text-align: center; color: #e74c3c; font-size: 38px; margin-bottom: 40px;">Checkout</h1>

    <div style="display: flex; gap: 30px; flex-wrap: wrap;">

      <!-- Left Side - Form -->
      <div style="flex: 2; background-color: #1e2937; padding: 30px; border-radius: 15px;">

        <h2 style="margin-bottom: 25px; color: white;">Contact Information</h2>
        
        <div style="margin-bottom: 25px;">
          <label style="display: block; margin-bottom: 8px; font-weight: bold;">Email Address</label>
          <input type="email" placeholder="your@email.com" style="width: 100%; padding: 14px; background: #334155; border: none; border-radius: 10px; color: white; font-size: 16px;">
        </div>

        <h2 style="margin-bottom: 20px; color: white;">Payment Method</h2>
        
        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;">
          <div style="padding: 15px; background: #334155; border-radius: 10px; border: 2px solid #e74c3c;">
            <i class="fas fa-credit-card"></i> Credit / Debit Card
          </div>
          <div style="padding: 15px; background: #334155; border-radius: 10px;">
            <i class="fas fa-mobile-alt"></i> UPI / Wallet
          </div>
          <div style="padding: 15px; background: #334155; border-radius: 10px;">
            <i class="fas fa-bank"></i> Net Banking
          </div>
        </div>

        <!-- Card Details -->
        <div style="background: #253549; padding: 20px; border-radius: 12px;">
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px;">Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456" style="width: 100%; padding: 14px; background: #334155; border: none; border-radius: 10px; color: white;">
          </div>
          
          <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 8px;">Expiry Date</label>
              <input type="text" placeholder="MM/YY" style="width: 100%; padding: 14px; background: #334155; border: none; border-radius: 10px; color: white;">
            </div>
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 8px;">CVV</label>
              <input type="text" placeholder="123" style="width: 100%; padding: 14px; background: #334155; border: none; border-radius: 10px; color: white;">
            </div>
          </div>
          
          <div style="margin-top: 20px;">
            <label style="display: block; margin-bottom: 8px;">Cardholder Name</label>
            <input type="text" placeholder="John Doe" style="width: 100%; padding: 14px; background: #334155; border: none; border-radius: 10px; color: white;">
          </div>
        </div>

      </div>

      <!-- Right Side - Order Summary -->
      <div style="flex: 1; background-color: #1e2937; padding: 30px; border-radius: 15px; min-width: 300px;">

        <h2 style="margin-bottom: 20px;">Order Summary</h2>
        
        <div style="line-height: 2.2;">
          <div style="display: flex; justify-content: space-between; padding: 8px 0;">
            <span>Thala Signature 07 (x1)</span>
            <span>₹4,999</span>
          </div>
          <div style="display: flex; justify-content: space-between; padding: 8px 0;">
            <span>Shipping</span>
            <span style="color:#4ade80;">FREE</span>
          </div>
          <div style="display: flex; justify-content: space-between; padding: 8px 0;">
            <span>GST (18%)</span>
            <span>₹899</span>
          </div>
        </div>

        <div style="border-top: 2px solid #334155; margin: 20px 0; padding-top: 15px; font-size: 22px; font-weight: bold; color: #e74c3c; display: flex; justify-content: space-between;">
          <span>Total</span>
          <span>₹5,898</span>
        </div>

        <button style="width: 100%; padding: 18px; background: #e74c3c; color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;">
          <i class="fas fa-lock"></i> Pay ₹5,898
        </button>

        <p style="text-align: center; margin-top: 15px; color: #94a3b8; font-size: 14px;">
          Secured by Razorpay
        </p>

      </div>

    </div>

  </div>

  <style>
    body {
      font-family: Arial, sans-serif;
    }
    
    input, button {
      font-size: 16px;
    }
    
    label {
      font-weight: bold;
    }
    
    h1, h2 {
      color: white;
    }
    
    @media (max-width: 900px) {
      div[style*="flex"] {
        flex-direction: column !important;
      }
    }
  </style>

</body>
</html>
